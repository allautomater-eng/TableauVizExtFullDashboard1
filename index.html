<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Donut Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://extensions.tableausoftware.com/lib/tableau.extensions.1.latest.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#07080f;
  --bg1:#0d0f1c;
  --bg2:#131627;
  --glass:rgba(255,255,255,0.04);
  --glass2:rgba(255,255,255,0.08);
  --rim:rgba(255,255,255,0.07);
  --rim2:rgba(255,255,255,0.14);
  --snow:#f0eef8;
  --muted:#7a7d99;
  --muted2:#484b66;
}

html,body{
  width:100%;height:100%;
  background:var(--bg0);
  color:var(--snow);
  font-family:'Sora',sans-serif;
  overflow:hidden;
}

/* ── AMBIENT BG ── */
.ambient{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(99,102,241,.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(236,72,153,.09) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 60% 20%, rgba(34,211,238,.07) 0%, transparent 70%);
}

/* ── TOPBAR ── */
.topbar{
  position:relative;z-index:10;
  padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(13,15,28,.7);
  border-bottom:1px solid var(--rim);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{
  width:8px;height:8px;border-radius:50%;
  background:conic-gradient(from 0deg,#6366f1,#ec4899,#22d3ee,#6366f1);
  animation:spinDot 4s linear infinite;
}
@keyframes spinDot{to{transform:rotate(360deg)}}
.brand-name{
  font-family:'Playfair Display',serif;
  font-size:15px;color:var(--snow);letter-spacing:.5px;
}
.brand-sub{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:8px}
#conn{
  font-size:9px;padding:3px 10px;border-radius:20px;
  border:1px solid var(--rim2);color:var(--muted);
  text-transform:uppercase;letter-spacing:.7px;
  background:var(--glass);
  transition:all .4s;
}
#conn.live{border-color:rgba(34,211,238,.4);color:#22d3ee;background:rgba(34,211,238,.06)}
#conn.demo{border-color:rgba(99,102,241,.4);color:#818cf8;background:rgba(99,102,241,.06)}
.btn-dbg{
  font-size:9px;padding:3px 9px;border-radius:4px;
  border:1px solid var(--rim);background:transparent;
  color:var(--muted);cursor:pointer;text-transform:uppercase;
  letter-spacing:.5px;transition:all .2s;
}
.btn-dbg:hover{border-color:#6366f1;color:#818cf8}

/* ── NOTICE ── */
#notice{
  position:relative;z-index:10;
  font-size:11px;padding:6px 20px;
  border-bottom:1px solid transparent;
  display:none;
}
#notice.show{display:block}
#notice.demo{background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.2);color:#818cf8}
#notice.live{background:rgba(34,211,238,.06);border-color:rgba(34,211,238,.2);color:#22d3ee}
#notice.err{background:rgba(244,63,94,.07);border-color:rgba(244,63,94,.2);color:#fb7185}

/* ── DEBUG ── */
#dbg{
  display:none;position:relative;z-index:10;
  margin:6px 16px;background:rgba(0,0,0,.7);
  border:1px solid var(--rim2);border-radius:6px;
  padding:8px;font-family:monospace;font-size:10px;
  color:#4ade80;max-height:120px;overflow-y:auto;white-space:pre-wrap;
}
#dbg.show{display:block}

/* ── MAIN VIZ AREA ── */
.viz-wrap{
  position:relative;z-index:5;
  display:flex;align-items:stretch;
  height:calc(100vh - 46px);
  overflow:hidden;
}

/* ── CANVAS ── */
#donut-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
}

/* ── LEGEND PANEL ── */
.legend-panel{
  position:absolute;right:0;top:0;bottom:0;
  width:200px;
  background:rgba(13,15,28,.6);
  border-left:1px solid var(--rim);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  display:flex;flex-direction:column;
  padding:20px 16px;gap:6px;
  overflow-y:auto;
  z-index:20;
}
.legend-title{
  font-size:9px;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--muted);margin-bottom:8px;padding-bottom:8px;
  border-bottom:1px solid var(--rim);
}
.legend-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 10px;border-radius:8px;
  border:1px solid transparent;
  cursor:pointer;transition:all .2s;
}
.legend-item:hover,.legend-item.active{
  background:var(--glass2);border-color:var(--rim2);
}
.legend-swatch{
  width:10px;height:10px;border-radius:3px;flex-shrink:0;
}
.legend-label{font-size:11px;color:var(--snow);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend-pct{font-size:11px;font-weight:600;color:var(--muted)}
.legend-val{font-size:9px;color:var(--muted2);margin-top:1px}

/* ── CENTRE STATS ── */
.centre-overlay{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) translateX(-100px);
  display:flex;flex-direction:column;align-items:center;
  gap:3px;pointer-events:none;z-index:25;text-align:center;
}
.centre-label{
  font-size:9px;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);
}
.centre-val{
  font-family:'Playfair Display',serif;
  font-size:34px;font-weight:700;color:var(--snow);
  line-height:1;
  text-shadow:0 0 40px rgba(99,102,241,.5);
  transition:all .3s;
}
.centre-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── EMPTY STATE ── */
#empty{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:30;
  background:rgba(7,8,15,.85);
  backdrop-filter:blur(4px);
}
#empty.hidden{display:none}
.empty-ring{
  width:100px;height:100px;border-radius:50%;
  border:2px dashed var(--rim2);
  display:flex;align-items:center;justify-content:center;
  animation:spinRing 8s linear infinite;
  position:relative;
}
@keyframes spinRing{to{transform:rotate(360deg)}}
.empty-inner{
  width:60px;height:60px;border-radius:50%;
  background:var(--glass);
  display:flex;align-items:center;justify-content:center;
  transform:rotate(0deg);animation:spinRingRev 8s linear infinite;
}
@keyframes spinRingRev{to{transform:rotate(-360deg)}}
.empty-icon{font-size:22px}
.empty-head{
  font-family:'Playfair Display',serif;
  font-size:20px;color:var(--snow);opacity:.6;
}
.empty-body{
  font-size:11px;color:var(--muted);text-align:center;
  max-width:280px;line-height:1.8;
}
.enc-pill{
  display:inline-block;padding:3px 10px;border-radius:20px;
  border:1px solid var(--rim2);font-size:10px;color:#818cf8;
  background:rgba(99,102,241,.08);margin:2px;
}
</style>
</head>
<body>

<div class="ambient"></div>

<!-- Topbar -->
<header class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <div class="brand-name">Donut Studio</div>
      <div class="brand-sub">Viz Extension</div>
    </div>
  </div>
  <div class="topbar-right">
    <span id="conn">● Connecting</span>
    <button class="btn-dbg" onclick="toggleDbg()">debug</button>
  </div>
</header>

<div id="notice"></div>
<div id="dbg"></div>

<!-- Viz area -->
<div class="viz-wrap" id="viz-wrap">

  <!-- Main canvas -->
  <canvas id="donut-canvas"></canvas>

  <!-- Centre overlay -->
  <div class="centre-overlay" id="centre">
    <div class="centre-label" id="c-label">Total</div>
    <div class="centre-val"  id="c-val">—</div>
    <div class="centre-sub"  id="c-sub"></div>
  </div>

  <!-- Legend -->
  <div class="legend-panel" id="legend-panel">
    <div class="legend-title">Breakdown</div>
    <div id="legend-items"></div>
  </div>

  <!-- Empty state -->
  <div id="empty">
    <div class="empty-ring">
      <div class="empty-inner"><div class="empty-icon">◎</div></div>
    </div>
    <div class="empty-head">Donut Studio</div>
    <div class="empty-body">
      Drop fields on the Marks card to visualise your data.<br/><br/>
      <span class="enc-pill">$ Value</span> — numeric measure<br/>
      <span class="enc-pill">▦ Category</span> — string dimension
    </div>
  </div>

</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   DEMO DATA
══════════════════════════════════════════ */
const DEMO_DATA = [
  {label:'Technology',     value:836154},
  {label:'Furniture',      value:741999},
  {label:'Office Supplies',value:719047},
];

/* ══════════════════════════════════════════
   COLOUR PALETTE  — vivid, distinct, modern
══════════════════════════════════════════ */
const PALETTE = [
  {h:'#6366f1', gA:'#818cf8', gB:'#4f46e5'},  // indigo
  {h:'#ec4899', gA:'#f472b6', gB:'#db2777'},  // pink
  {h:'#22d3ee', gA:'#67e8f9', gB:'#0891b2'},  // cyan
  {h:'#f59e0b', gA:'#fbbf24', gB:'#d97706'},  // amber
  {h:'#10b981', gA:'#34d399', gB:'#059669'},  // emerald
  {h:'#f43f5e', gA:'#fb7185', gB:'#e11d48'},  // rose
  {h:'#8b5cf6', gA:'#a78bfa', gB:'#7c3aed'},  // violet
  {h:'#06b6d4', gA:'#22d3ee', gB:'#0284c7'},  // sky
  {h:'#84cc16', gA:'#a3e635', gB:'#65a30d'},  // lime
  {h:'#fb923c', gA:'#fdba74', gB:'#ea580c'},  // orange
];

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let DATA    = [];          // [{label, value}]
let SLICES  = [];          // computed arc data
let hovIdx  = -1;          // hovered slice index
let activeIdx = -1;        // clicked/selected slice
let animProg = 0;          // 0→1 entry animation
let animReq  = null;
let particles = [];
let dbgLines = [];

/* ══════════════════════════════════════════
   CANVAS SETUP
══════════════════════════════════════════ */
const cvs  = document.getElementById('donut-canvas');
const ctx  = cvs.getContext('2d');
let CW, CH, CX, CY, R, INNER;

function resize() {
  const wrap = document.getElementById('viz-wrap');
  CW = cvs.width  = wrap.clientWidth;
  CH = cvs.height = wrap.clientHeight;
  const legendW = 200;
  CX = (CW - legendW) / 2;
  CY = CH / 2;
  R  = Math.min(CX, CY) * 0.72;
  INNER = R * 0.52;
  if (DATA.length) drawFrame(animProg);
}
window.addEventListener('resize', resize);

/* ══════════════════════════════════════════
   FORMAT
══════════════════════════════════════════ */
function fmtM(v) {
  const a = Math.abs(v), s = v < 0 ? '-' : '';
  return a >= 1e9 ? s + '$' + (a / 1e9).toFixed(2) + 'B'
       : a >= 1e6 ? s + '$' + (a / 1e6).toFixed(2) + 'M'
       : a >= 1e3 ? s + '$' + (a / 1e3).toFixed(1) + 'K'
       : s + '$' + a.toFixed(0);
}
function fmtN(v) { return Math.round(Math.abs(v)).toLocaleString(); }
function fmtPct(v) { return (v * 100).toFixed(1) + '%'; }

/* ══════════════════════════════════════════
   DEBUG
══════════════════════════════════════════ */
function log(...a) {
  const m = a.map(x => typeof x === 'object' ? JSON.stringify(x) : String(x)).join(' ');
  dbgLines.push(m); console.log('[DonutExt]', ...a);
  const el = document.getElementById('dbg');
  el.textContent = dbgLines.join('\n');
  el.scrollTop = el.scrollHeight;
}
function toggleDbg() { document.getElementById('dbg').classList.toggle('show'); }

function showNotice(cls, html) {
  const el = document.getElementById('notice');
  el.className = 'show ' + cls; el.innerHTML = html;
}

/* ══════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════ */
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 2 + Math.random() * 3,
      alpha: 1,
      color,
      life: 0.6 + Math.random() * 0.4,
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.alpha > 0.01);
  particles.forEach(p => {
    p.x  += p.vx; p.y  += p.vy;
    p.vy += 0.08; // gravity
    p.vx *= 0.97;
    p.alpha -= 0.025 / p.life;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

/* ══════════════════════════════════════════
   EASING
══════════════════════════════════════════ */
function easeOutElastic(t) {
  const c4 = (2 * Math.PI) / 3;
  return t === 0 ? 0 : t === 1 ? 1
    : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
}
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutQuart(t) { return t < 0.5 ? 8*t*t*t*t : 1-Math.pow(-2*t+2,4)/2; }

/* ══════════════════════════════════════════
   COMPUTE SLICES
══════════════════════════════════════════ */
function computeSlices() {
  const total = DATA.reduce((a, b) => a + b.value, 0);
  let angle = -Math.PI / 2; // start at top
  const GAP = 0.018;
  SLICES = DATA.map((d, i) => {
    const sweep = (d.value / total) * (Math.PI * 2 - GAP * DATA.length);
    const start = angle + GAP / 2;
    const end   = angle + GAP / 2 + sweep;
    const mid   = (start + end) / 2;
    angle += sweep + GAP;
    return {
      label: d.label,
      value: d.value,
      pct:   d.value / total,
      start, end, mid,
      color: PALETTE[i % PALETTE.length],
      idx:   i,
    };
  });
}

/* ══════════════════════════════════════════
   DRAW
══════════════════════════════════════════ */
function drawFrame(prog) {
  ctx.clearRect(0, 0, CW, CH);
  if (!SLICES.length) return;

  const ease = easeOutElastic(Math.min(prog, 1));
  const totalSweep = Math.PI * 2 * ease;
  let runAngle = -Math.PI / 2;
  const GAP = 0.018;

  /* ── Draw each slice ── */
  SLICES.forEach((sl, i) => {
    const isHov = i === hovIdx || i === activeIdx;
    const explode = isHov ? (INNER * 0.08) : 0;
    const sliceSweep = sl.pct * totalSweep - (prog >= 1 ? GAP : 0);

    if (sliceSweep <= 0) { runAngle += sliceSweep + GAP; return; }

    const sA = runAngle + (prog >= 1 ? GAP / 2 : 0);
    const eA = sA + sliceSweep;
    const mid = (sA + eA) / 2;
    const ox  = isHov ? Math.cos(mid) * explode : 0;
    const oy  = isHov ? Math.sin(mid) * explode : 0;

    /* gradient */
    const gx1 = CX + ox + Math.cos(sA) * R;
    const gy1 = CY + oy + Math.sin(sA) * R;
    const grad = ctx.createLinearGradient(gx1, gy1, CX + ox, CY + oy);
    grad.addColorStop(0, sl.color.gA);
    grad.addColorStop(1, sl.color.gB);

    /* glow on hover */
    ctx.save();
    if (isHov) {
      ctx.shadowColor = sl.color.h;
      ctx.shadowBlur  = 32;
    }

    /* outer arc */
    ctx.beginPath();
    ctx.moveTo(CX + ox + Math.cos(sA) * INNER, CY + oy + Math.sin(sA) * INNER);
    ctx.arc(CX + ox, CY + oy, R, sA, eA);
    ctx.arc(CX + ox, CY + oy, INNER, eA, sA, true);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    /* rim highlight */
    if (isHov) {
      ctx.beginPath();
      ctx.arc(CX + ox, CY + oy, R, sA, eA);
      ctx.arc(CX + ox, CY + oy, R - 3, eA, sA, true);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fill();
    }
    ctx.restore();

    /* label on large slices */
    if (sl.pct > 0.06 && prog >= 0.95) {
      const lx = CX + ox + Math.cos(mid) * (INNER + (R - INNER) * 0.55);
      const ly = CY + oy + Math.sin(mid) * (INNER + (R - INNER) * 0.55);
      ctx.save();
      ctx.globalAlpha = (prog - 0.95) / 0.05;
      ctx.fillStyle = '#fff';
      ctx.font = `600 ${Math.max(10, R * 0.075)}px Sora, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur  = 6;
      ctx.fillText(fmtPct(sl.pct), lx, ly);
      ctx.restore();
    }

    runAngle += sliceSweep + (prog >= 1 ? GAP : 0);
  });

  /* ── Inner glow ring ── */
  if (prog > 0.3) {
    const glowA = Math.min((prog - 0.3) / 0.4, 1);
    const ig = ctx.createRadialGradient(CX, CY, INNER * 0.6, CX, CY, INNER);
    ig.addColorStop(0, 'rgba(99,102,241,0)');
    ig.addColorStop(0.7,'rgba(99,102,241,0)');
    ig.addColorStop(1,  'rgba(99,102,241,0.12)');
    ctx.save();
    ctx.globalAlpha = glowA;
    ctx.beginPath(); ctx.arc(CX, CY, INNER, 0, Math.PI * 2);
    ctx.fillStyle = ig; ctx.fill();
    ctx.restore();
  }

  /* ── Particles ── */
  updateParticles();
  drawParticles();

  /* ── Rotating outer tick ring (subtle) ── */
  if (prog >= 1) {
    const tickCount = 60;
    const now = Date.now() / 1000;
    for (let i = 0; i < tickCount; i++) {
      const a  = (i / tickCount) * Math.PI * 2 + now * 0.15;
      const r1 = R + 8;
      const r2 = R + (i % 5 === 0 ? 14 : 10);
      const alpha = i % 5 === 0 ? 0.35 : 0.12;
      ctx.save();
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = i % 5 === 0 ? 1.5 : 0.8;
      ctx.beginPath();
      ctx.moveTo(CX + Math.cos(a) * r1, CY + Math.sin(a) * r1);
      ctx.lineTo(CX + Math.cos(a) * r2, CY + Math.sin(a) * r2);
      ctx.stroke();
      ctx.restore();
    }
  }
}

/* ══════════════════════════════════════════
   ANIMATION LOOP
══════════════════════════════════════════ */
let lastTime = null;
let animating = false;

function animate(ts) {
  if (!lastTime) lastTime = ts;
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;

  if (animProg < 1) {
    animProg = Math.min(animProg + dt * 1.1, 1);
  }

  drawFrame(animProg);
  animReq = requestAnimationFrame(animate);
}

function startAnim() {
  animProg = 0;
  lastTime = null;
  if (animReq) cancelAnimationFrame(animReq);
  animReq = requestAnimationFrame(animate);
}

/* Keep ticking for particles and tick ring even after entry anim */
function startIdleLoop() {
  function idle(ts) {
    if (!lastTime) lastTime = ts;
    lastTime = ts;
    drawFrame(1);
    animReq = requestAnimationFrame(idle);
  }
  if (animReq) cancelAnimationFrame(animReq);
  animReq = requestAnimationFrame(idle);
}

/* ══════════════════════════════════════════
   LEGEND
══════════════════════════════════════════ */
function buildLegend() {
  const container = document.getElementById('legend-items');
  container.innerHTML = '';
  SLICES.forEach((sl, i) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-swatch" style="background:${sl.color.h};box-shadow:0 0 6px ${sl.color.h}60"></div>
      <div style="flex:1;min-width:0">
        <div class="legend-label" title="${sl.label}">${sl.label}</div>
        <div class="legend-val">${fmtM(sl.value)}</div>
      </div>
      <div class="legend-pct">${fmtPct(sl.pct)}</div>
    `;
    item.onmouseenter = () => {
      hovIdx = i;
      updateCentre(sl);
    };
    item.onmouseleave = () => {
      hovIdx = -1;
      updateCentre(null);
    };
    item.onclick = () => {
      activeIdx = activeIdx === i ? -1 : i;
      document.querySelectorAll('.legend-item').forEach((el, j) => {
        el.classList.toggle('active', j === activeIdx);
      });
      if (activeIdx === i) {
        const mid = sl.mid;
        const px  = CX + Math.cos(mid) * (INNER + (R - INNER) * 0.5);
        const py  = CY + Math.sin(mid) * (INNER + (R - INNER) * 0.5);
        spawnParticles(px, py, sl.color.h, 28);
      }
    };
    container.appendChild(item);
  });
}

/* ══════════════════════════════════════════
   CENTRE LABEL
══════════════════════════════════════════ */
const totalAll = () => DATA.reduce((a, b) => a + b.value, 0);

function updateCentre(sl) {
  const lbl = document.getElementById('c-label');
  const val = document.getElementById('c-val');
  const sub = document.getElementById('c-sub');
  if (sl) {
    lbl.textContent = sl.label;
    val.textContent = fmtM(sl.value);
    sub.textContent = fmtPct(sl.pct) + ' of total';
    val.style.textShadow = `0 0 40px ${sl.color.h}`;
  } else if (activeIdx >= 0 && SLICES[activeIdx]) {
    const s = SLICES[activeIdx];
    lbl.textContent = s.label;
    val.textContent = fmtM(s.value);
    sub.textContent = fmtPct(s.pct) + ' of total';
    val.style.textShadow = `0 0 40px ${s.color.h}`;
  } else {
    lbl.textContent = 'Total';
    val.textContent = fmtM(totalAll());
    sub.textContent = DATA.length + ' categories';
    val.style.textShadow = '0 0 40px rgba(99,102,241,.5)';
  }
}

/* ══════════════════════════════════════════
   HOVER via canvas mouse
══════════════════════════════════════════ */
cvs.addEventListener('mousemove', (e) => {
  if (!SLICES.length) return;
  const rect  = cvs.getBoundingClientRect();
  const mx    = e.clientX - rect.left;
  const my    = e.clientY - rect.top;
  const dx    = mx - CX, dy = my - CY;
  const dist  = Math.sqrt(dx*dx + dy*dy);

  if (dist < INNER || dist > R + 20) {
    if (hovIdx !== -1) { hovIdx = -1; updateCentre(null); }
    return;
  }

  let angle = Math.atan2(dy, dx);
  if (angle < -Math.PI/2) angle += Math.PI*2;

  for (const sl of SLICES) {
    let s = sl.start, e2 = sl.end;
    if (s < -Math.PI/2) { s += Math.PI*2; e2 += Math.PI*2; }
    if (angle >= s && angle <= e2) {
      if (hovIdx !== sl.idx) {
        hovIdx = sl.idx;
        updateCentre(sl);
        document.querySelectorAll('.legend-item').forEach((el, j) => {
          el.classList.toggle('active', j === sl.idx);
        });
      }
      return;
    }
  }
  if (hovIdx !== -1) { hovIdx = -1; updateCentre(null); }
});

cvs.addEventListener('mouseleave', () => {
  hovIdx = -1;
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
  updateCentre(null);
});

cvs.addEventListener('click', (e) => {
  if (!SLICES.length || hovIdx < 0) return;
  const sl = SLICES[hovIdx];
  activeIdx = activeIdx === hovIdx ? -1 : hovIdx;
  document.querySelectorAll('.legend-item').forEach((el, j) => {
    el.classList.toggle('active', j === activeIdx);
  });
  if (activeIdx >= 0) {
    const px = CX + Math.cos(sl.mid) * (INNER + (R - INNER) * 0.5);
    const py = CY + Math.sin(sl.mid) * (INNER + (R - INNER) * 0.5);
    spawnParticles(px, py, sl.color.h, 32);
  }
  updateCentre(null);
});

/* ══════════════════════════════════════════
   LOAD DATA → RENDER
══════════════════════════════════════════ */
function loadData(rawData) {
  DATA = rawData.filter(d => d.value > 0).sort((a, b) => b.value - a.value);
  if (!DATA.length) { showEmpty(true); return; }

  computeSlices();
  buildLegend();
  updateCentre(null);
  showEmpty(false);
  resize();
  activeIdx = -1;
  particles = [];
  startAnim();

  /* spawn entry particles */
  setTimeout(() => {
    SLICES.forEach(sl => {
      const px = CX + Math.cos(sl.mid) * (INNER + (R - INNER) * 0.5);
      const py = CY + Math.sin(sl.mid) * (INNER + (R - INNER) * 0.5);
      spawnParticles(px, py, sl.color.h, 12);
    });
  }, 800);
}

function showEmpty(show) {
  document.getElementById('empty').classList.toggle('hidden', !show);
  document.getElementById('legend-items').innerHTML = show ? '' : document.getElementById('legend-items').innerHTML;
}

/* ══════════════════════════════════════════
   COLUMN FINDER
══════════════════════════════════════════ */
function findCol(cols, ...hints) {
  for (const h of hints) {
    let i = cols.findIndex(c => c.fieldName.toLowerCase() === h.toLowerCase());
    if (i >= 0) { log('✓ "'+cols[i].fieldName+'"'); return i; }
    i = cols.findIndex(c => c.fieldName.toLowerCase().includes(h.toLowerCase()));
    if (i >= 0) { log('~ "'+cols[i].fieldName+'"'); return i; }
  }
  log('✗ no match: ' + hints.join(', ')); return -1;
}

function rawVal(r, i) {
  if (i < 0) return null;
  const v = r[i];
  return v == null ? null : (typeof v === 'object' && 'value' in v ? v.value : v);
}
function numVal(r, i) { const v = rawVal(r, i); return (!v || v === 'Null') ? 0 : parseFloat(v) || 0; }
function strVal(r, i) { const v = rawVal(r, i); return (!v || v === 'Null') ? 'Unknown' : String(v); }

/* ══════════════════════════════════════════
   AGGREGATE
══════════════════════════════════════════ */
function aggregateByDimension(rows, iDim, iMeasure) {
  const map = {};
  rows.forEach(r => {
    const k = iDim >= 0 ? strVal(r, iDim) : 'Total';
    const v = numVal(r, iMeasure);
    map[k] = (map[k] || 0) + v;
  });
  return Object.entries(map).map(([label, value]) => ({label, value}));
}

/* ══════════════════════════════════════════
   TABLEAU WORKSHEET CONTENT API
══════════════════════════════════════════ */
async function fetchAndRender(worksheet) {
  try {
    log('getSummaryDataAsync…');
    const dt = await worksheet.getSummaryDataAsync({maxRows: 200000});
    log('rows:' + dt.data.length + ' cols:' + dt.columns.length);
    log('cols: ' + dt.columns.map(c => '"' + c.fieldName + '"').join(', '));

    if (!dt.data.length) {
      log('empty dataset');
      showEmpty(true);
      return;
    }

    const cols = dt.columns;
    /* Try to find measure + dimension, fallback to first numeric + first string */
    let iMeasure = findCol(cols, 'Sales', 'Profit', 'Revenue', 'Value', 'Quantity', 'Discount');
    let iDim     = findCol(cols, 'Category', 'Sub-Category', 'Region', 'Segment', 'Ship Mode', 'State', 'Country');

    /* fallback: first numeric col */
    if (iMeasure < 0) {
      iMeasure = cols.findIndex(c => ['int', 'float'].includes((c.dataType || '').toLowerCase()));
      if (iMeasure >= 0) log('fallback measure: ' + cols[iMeasure].fieldName);
    }
    /* fallback: first string col */
    if (iDim < 0) {
      iDim = cols.findIndex(c => (c.dataType || '').toLowerCase() === 'string');
      if (iDim >= 0) log('fallback dim: ' + cols[iDim].fieldName);
    }

    if (iMeasure < 0) {
      log('no numeric column found — demo data');
      showNotice('demo', '⚠ No numeric measure found. Drop a measure onto the <strong>Value</strong> tile. Showing demo data.');
      loadData(DEMO_DATA); return;
    }

    const agg = aggregateByDimension(dt.data, iDim, iMeasure);
    log('aggregated ' + agg.length + ' slices');
    log(JSON.stringify(agg.slice(0, 5)));

    if (!agg.length || agg.every(d => d.value === 0)) {
      log('all zeros'); showEmpty(true); return;
    }

    const measureName = cols[iMeasure].fieldName;
    const dimName     = iDim >= 0 ? cols[iDim].fieldName : 'Total';
    document.getElementById('c-sub').textContent = measureName + ' by ' + dimName;
    showNotice('live', '✓ Live — <strong>' + measureName + '</strong> by <strong>' + dimName + '</strong> · ' + fmtN(dt.data.length) + ' rows');

    loadData(agg);

  } catch (err) {
    log('fetchAndRender error: ' + err.message);
    showNotice('err', '⚠ Error reading data: ' + err.message + '. Showing demo data.');
    loadData(DEMO_DATA);
  }
}

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
(async function boot() {
  resize();

  try {
    log('initializeAsync…');
    await tableau.extensions.initializeAsync();
    log('✓ init');

    /* VIZ EXTENSION: worksheetContent */
    const ws = tableau.extensions.worksheetContent.worksheet;
    log('worksheet: ' + ws.name);

    document.getElementById('conn').textContent = '● ' + ws.name;
    document.getElementById('conn').className   = 'live';

    /* re-render when user drops/removes fields or filters change */
    ws.addEventListener(tableau.TableauEventType.SummaryDataChanged, () => {
      log('SummaryDataChanged');
      fetchAndRender(ws);
    });

    await fetchAndRender(ws);

  } catch (err) {
    log('init failed: ' + err.message);
    document.getElementById('conn').textContent = '● Demo';
    document.getElementById('conn').className   = 'demo';
    showNotice('demo', '⚠ <strong>Demo mode</strong> — running outside Tableau or init failed. Showing sample data.');
    loadData(DEMO_DATA);
  }
})();
</script>
